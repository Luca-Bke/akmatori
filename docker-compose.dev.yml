# Maintainer development override.
# ================================
# Restores the local `build:` blocks that the published-image `docker-compose.yml`
# no longer contains. Use with the base file:
#
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#     # or simply: `make dev`
#
# Everything except `build:` (networks, volumes, environment, healthchecks, etc.)
# merges in from `docker-compose.yml` — keep this file build-only.

services:
  akmatori-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        http_proxy:  ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy:    ${no_proxy:-}
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}

  mcp-gateway:
    build:
      context: ./mcp-gateway
      dockerfile: Dockerfile
      args:
        http_proxy:  ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy:    ${no_proxy:-}
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}

  akmatori-agent:
    build:
      context: ./agent-worker
      dockerfile: Dockerfile
      args:
        http_proxy:  ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy:    ${no_proxy:-}
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        http_proxy:  ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy:    ${no_proxy:-}
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}
